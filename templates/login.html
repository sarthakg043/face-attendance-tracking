{% extends "base.html" %}
{% block title %}Admin Login{% endblock %}
{% block content %}
<div class="flex items-center justify-center min-h-[70vh]">
  <div class="w-full max-w-sm">
    <div class="bg-white rounded-2xl shadow-lg p-8 border border-gray-100">
      <div class="text-center mb-6">
        <div class="w-16 h-16 mx-auto mb-3 rounded-full bg-primary-100 text-primary-600 flex items-center justify-center">
          <svg class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
        </div>
        <h2 class="text-2xl font-bold">Admin Login</h2>
      </div>

      {% if error %}
      <div class="mb-4 p-3 bg-red-50 border border-red-200 text-red-700 rounded-lg text-sm">{{ error }}</div>
      {% endif %}

      <form method="POST" action="/admin/login" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
          <input type="text" name="username" required autocomplete="username"
            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <input type="password" name="password" required autocomplete="current-password"
            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition">
        </div>
        <button type="submit" class="w-full bg-primary-600 text-white py-2.5 rounded-lg font-medium hover:bg-primary-700 transition">
          Sign In
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
