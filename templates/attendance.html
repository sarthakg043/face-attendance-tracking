{% extends "base.html" %}
{% block title %}Mark Attendance{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto text-center">
  <h1 class="text-3xl font-bold mb-2">Attendance</h1>
  <p class="text-gray-500 mb-8">Look at the camera and click the button to clock in or out.</p>

  <!-- Video feed -->
  <div class="relative bg-black rounded-2xl overflow-hidden aspect-[4/3] mb-6 max-w-lg mx-auto shadow-lg">
    <video id="webcam" autoplay playsinline muted class="w-full h-full object-cover"></video>
    <canvas id="captureCanvas" class="hidden"></canvas>
    <!-- Result overlay -->
    <div id="resultOverlay" class="absolute inset-0 flex items-center justify-center pointer-events-none hidden">
      <div id="resultCard" class="bg-white/95 backdrop-blur rounded-2xl p-6 shadow-xl max-w-xs w-full mx-4"></div>
    </div>
  </div>

  <!-- Buttons -->
  <div class="flex gap-4 justify-center mb-6">
    <button id="btnMark" onclick="markAttendance()"
      class="px-8 py-3 bg-primary-600 text-white rounded-xl font-semibold text-lg hover:bg-primary-700 transition disabled:opacity-50 disabled:cursor-not-allowed shadow-lg">
      Mark Attendance
    </button>
  </div>

  <p id="statusMsg" class="text-gray-500 text-sm"></p>

  <!-- Recent activity -->
  <div id="recentActivity" class="mt-8 hidden">
    <h3 class="text-lg font-semibold mb-3 text-left">Recent Activity</h3>
    <div id="activityList" class="space-y-2"></div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let stream = null;
let gpsPosition = null;
const video = document.getElementById('webcam');
const canvas = document.getElementById('captureCanvas');
const ctx = canvas.getContext('2d');

async function initWebcam() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480, facingMode: 'user' } });
    video.srcObject = stream;
  } catch {
    showToast('Camera not available. Use the upload button.', 'warning');
  }
}
initWebcam();

// Request GPS location on page load
if (navigator.geolocation) {
  navigator.geolocation.getCurrentPosition(
    (pos) => { gpsPosition = { lat: pos.coords.latitude, lon: pos.coords.longitude }; },
    () => { /* GPS denied or unavailable — continue without it */ },
    { enableHighAccuracy: true, timeout: 10000 }
  );
}

function captureFrame() {
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  ctx.drawImage(video, 0, 0);
  return canvas.toDataURL('image/jpeg', 0.92);
}

async function sendPhoto(dataUrl) {
  const btn = document.getElementById('btnMark');
  const msg = document.getElementById('statusMsg');
  btn.disabled = true;
  msg.textContent = 'Recognising face…';
  msg.className = 'text-blue-600 text-sm';

  // Try to refresh GPS right before sending
  if (navigator.geolocation) {
    try {
      const pos = await new Promise((resolve, reject) =>
        navigator.geolocation.getCurrentPosition(resolve, reject, { enableHighAccuracy: true, timeout: 3000 })
      );
      gpsPosition = { lat: pos.coords.latitude, lon: pos.coords.longitude };
    } catch { /* use cached or null */ }
  }

  const payload = { photo: dataUrl };
  if (gpsPosition) {
    payload.gps_lat = gpsPosition.lat;
    payload.gps_lon = gpsPosition.lon;
  }

  try {
    const res = await fetch('/attendance/mark', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const data = await res.json();
    showResult(data);
  } catch {
    msg.textContent = 'Network error.';
    msg.className = 'text-red-600 text-sm';
  } finally {
    btn.disabled = false;
  }
}

function markAttendance() {
  if (!stream) { showToast('Camera not available', 'error'); return; }
  const frame = captureFrame();
  sendPhoto(frame);
}

function showResult(data) {
  const overlay = document.getElementById('resultOverlay');
  const card = document.getElementById('resultCard');
  const msg = document.getElementById('statusMsg');

  if (data.success) {
    const eventLabel = data.event === 'check_in' ? 'Checked In' : 'Checked Out';
    const eventColor = data.event === 'check_in' ? 'text-green-600' : 'text-orange-600';
    const eventBg = data.event === 'check_in' ? 'bg-green-50' : 'bg-orange-50';
    card.innerHTML = `
      <div class="${eventBg} rounded-xl p-4 mb-3">
        <p class="${eventColor} text-2xl font-bold">${eventLabel}</p>
      </div>
      <p class="text-xl font-bold text-gray-900">${data.name}</p>
      <p class="text-gray-500">${data.roll_no} · ${data.department}</p>
      <p class="text-xs text-gray-400 mt-2">Euc: ${data.match_score.euclidean.toFixed(4)} · Cos: ${data.match_score.cosine.toFixed(4)}</p>
    `;
    msg.textContent = '';
    showToast(`${data.name} — ${eventLabel}`, 'success');
    addActivity(data);
  } else if (data.deactivated) {
    card.innerHTML = `
      <div class="bg-amber-50 rounded-xl p-4">
        <div class="flex items-center justify-center mb-2">
          <svg class="w-8 h-8 text-amber-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4.5c-.77-.833-2.694-.833-3.464 0L3.34 16.5c-.77.833.192 2.5 1.732 2.5z"/></svg>
        </div>
        <p class="text-amber-700 text-xl font-bold">Account Deactivated</p>
        <p class="text-gray-600 text-sm mt-2">${data.error}</p>
      </div>
    `;
    msg.textContent = '';
    showToast('Account deactivated', 'warning');
  } else {
    card.innerHTML = `
      <div class="bg-red-50 rounded-xl p-4">
        <p class="text-red-600 text-xl font-bold">Not Recognised</p>
        <p class="text-gray-500 text-sm mt-1">${data.error}</p>
      </div>
    `;
    msg.textContent = '';
    showToast(data.error, 'error');
  }

  overlay.classList.remove('hidden');
  setTimeout(() => overlay.classList.add('hidden'), 4000);
}

function addActivity(data) {
  const section = document.getElementById('recentActivity');
  const list = document.getElementById('activityList');
  section.classList.remove('hidden');
  const eventLabel = data.event === 'check_in' ? 'IN' : 'OUT';
  const color = data.event === 'check_in' ? 'bg-green-100 text-green-700' : 'bg-orange-100 text-orange-700';
  const now = new Date().toLocaleTimeString();
  const el = document.createElement('div');
  el.className = 'flex items-center justify-between bg-white rounded-lg px-4 py-3 border border-gray-100 text-left';
  el.innerHTML = `
    <div class="flex items-center gap-3">
      <span class="${color} px-2.5 py-1 rounded-md text-xs font-bold">${eventLabel}</span>
      <span class="font-medium">${data.name}</span>
      <span class="text-gray-400 text-sm">${data.roll_no}</span>
    </div>
    <span class="text-gray-400 text-sm">${now}</span>
  `;
  list.prepend(el);
}
</script>
{% endblock %}
